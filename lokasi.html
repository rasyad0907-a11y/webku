<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Klik untuk Kamu</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2em; }
    #location { margin-top: 1em; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Klik untuk Kamu</h1>
  <button id="getLocationBtn">Klik untuk Kamu</button>
  <div id="location"></div>

  <script>
    const btn = document.getElementById('getLocationBtn');
    const locationDiv = document.getElementById('location');

    btn.addEventListener('click', () => {
      if (!navigator.geolocation) {
        locationDiv.textContent = 'Browser Anda tidak mendukung fitur lokasi.';
        return;
      }

      locationDiv.textContent = 'Mencari lokasi…';

      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          locationDiv.textContent = `Lokasi kamu: Latitude ${lat.toFixed(6)}, Longitude ${lon.toFixed(6)}`;

          // Kirim data lokasi ke server
          fetch('http://localhost:3000/api/save-location', {  // Ganti URL sesuai server Anda
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ latitude: lat, longitude: lon, timestamp: Date.now() })
          })
          .then(response => response.json())
          .then(data => {
            console.log('Lokasi berhasil dikirim ke server:', data);
          })
          .catch(error => {
            console.error('Gagal mengirim lokasi ke server:', error);
          });
        },
        (error) => {
          locationDiv.textContent = 'Gagal mendapatkan lokasi.';
        }
      );
    });
  </script>
</body>
</html>
